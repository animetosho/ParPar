name: PAR3 Wave 8-9 Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # Basic lint check - verify JS syntax
          node --check lib/par3gen.js || exit 1
          node --check bin/par3.js || exit 1

  test-wave8:
    name: Wave 8 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build native addon
        run: npm install
      - name: Build GF64 tests
        run: |
          cd gf64/test
          make clean || true
          make
      - name: Run GF64 tests
        run: |
          echo "=== Running GF64 Basic Tests ==="
          ./gf64/test/test
          echo ""
          echo "=== GF64 Basic Tests Complete ==="
          # Note: test_all requires AVX2/AVX512 which may not be available on all CI runners
          # Run manually on capable hardware: cd gf64/test && make test_all && ./test_all

      - name: Setup Node 22.16.0 for par3 recovery perf test
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      - name: Run par3 recovery perf test
        timeout-minutes: 5
        run: node test/par3-recovery-perf.js

  test-wave9:
    name: Wave 9 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and verify
        run: |
          npm install
          echo "Build successful - PAR3 gf64 integration complete"

  par3-e2e:
    name: PAR3 E2E Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Create test files
        run: |
          mkdir -p par3-test-input
          echo "Test data file 1 - contains some sample text for PAR3 testing" > par3-test-input/file1.txt
          echo "Test data file 2 - another sample file with different content" > par3-test-input/file2.txt
          echo "Test data file 3 - third file to ensure multiple file handling works" > par3-test-input/file3.txt

      - name: Compute original checksums
        id: original-checksums
        shell: bash
        run: |
          echo "file1_checksum=$(sha256sum par3-test-input/file1.txt | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "file2_checksum=$(sha256sum par3-test-input/file2.txt | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "file3_checksum=$(sha256sum par3-test-input/file3.txt | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Create PAR3 archive
        run: |
          mkdir -p par3-test-output
          node bin/par3.js create --output par3-test-output/data --recovery-slices 2 par3-test-input/file1.txt par3-test-input/file2.txt par3-test-input/file3.txt

      - name: Verify PAR3 archive was created
        run: |
          if [ ! -f par3-test-output/data.par3 ]; then
            echo "ERROR: PAR3 archive was not created"
            exit 1
          fi
          echo "PAR3 archive created successfully"

      - name: Verify PAR3 archive
        run: node bin/par3.js verify par3-test-output/data.par3

      - name: Corrupt source file
        shell: bash
        run: |
          # Corrupt a byte in file1.txt (flip the first character)
          sed -i 's/^./X/' par3-test-input/file1.txt
          echo "Corrupted file1.txt"

      - name: Verify corruption
        shell: bash
        run: |
          corrupted=$(sha256sum par3-test-input/file1.txt | cut -d' ' -f1)
          original="${{ steps.original-checksums.outputs.file1_checksum }}"
          if [ "$corrupted" == "$original" ]; then
            echo "ERROR: File was not corrupted properly"
            exit 1
          fi
          echo "Corruption verified: checksums differ"

      - name: Repair PAR3 archive
        run: node bin/par3.js repair par3-test-output/data.par3 --output-dir par3-test-repaired

      - name: Verify repaired files exist
        shell: bash
        run: |
          for f in file1.txt file2.txt file3.txt; do
            if [ ! -f "par3-test-repaired/$f" ]; then
              echo "ERROR: Repaired $f was not created"
              exit 1
            fi
          done
          echo "All repaired files exist"

      - name: Verify checksums match original
        shell: bash
        run: |
          repaired1=$(sha256sum par3-test-repaired/file1.txt | cut -d' ' -f1)
          repaired2=$(sha256sum par3-test-repaired/file2.txt | cut -d' ' -f1)
          repaired3=$(sha256sum par3-test-repaired/file3.txt | cut -d' ' -f1)

          original1="${{ steps.original-checksums.outputs.file1_checksum }}"
          original2="${{ steps.original-checksums.outputs.file2_checksum }}"
          original3="${{ steps.original-checksums.outputs.file3_checksum }}"

          for i in 1 2 3; do
            repaired_val=$(eval echo \$repaired$i)
            original_val=$(eval echo \$original$i)
            if [ "$repaired_val" != "$original_val" ]; then
              echo "ERROR: Repaired file$i checksum does not match original"
              echo "Original: $original_val"
              echo "Repaired: $repaired_val"
              exit 1
            fi
          done

          echo "All checksums verified - repair successful!"