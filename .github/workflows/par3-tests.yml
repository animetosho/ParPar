          if bash gf32/test/test_repair_speed_ssse3.sh; then
            echo "PASS: test_repair_speed_ssse3.sh"
          else
            echo "FAIL: test_repair_speed_ssse3.sh"
            failed=1
          fi
          
          # T9.12: Large repair (1M blocks)
          echo ""
          echo "--- Running: test_repair_large_1m_blocks.sh ---"
          if bash gf32/test/test_repair_large_1m_blocks.sh; then
            echo "PASS: test_repair_large_1m_blocks.sh"
          else
            echo "FAIL: test_repair_large_1m_blocks.sh"
            failed=1
          fi
          
          # T9.13: Repair already complete
          echo ""
          echo "--- Running: test_repair_already_complete.sh ---"
          if bash gf32/test/test_repair_already_complete.sh; then
            echo "PASS: test_repair_already_complete.sh"
          else
            echo "FAIL: test_repair_already_complete.sh"
            failed=1
          fi
          
          # T9.14: Repair target missing
          echo ""
          echo "--- Running: test_repair_target_missing.sh ---"
          if bash gf32/test/test_repair_target_missing.sh; then
            echo "PASS: test_repair_target_missing.sh"
          else
            echo "FAIL: test_repair_target_missing.sh"
            failed=1
          fi
          
          echo ""
