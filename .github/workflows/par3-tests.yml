name: PAR3 Wave 8-9 Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # Basic lint check - verify JS syntax
          node --check lib/par3gen.js || exit 1
          node --check bin/par3.js || exit 1

  test-wave8:
    name: Wave 8 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build native addon
        run: npm install
      - name: Build GF64 tests
        run: |
          cd gf64/test
          make clean || true
          make
      - name: Run GF64 tests
        run: |
          echo "=== Running GF64 Basic Tests ==="
          ./gf64/test/test
          echo ""
          echo "=== GF64 Basic Tests Complete ==="
          # Note: test_all requires AVX2/AVX512 which may not be available on all CI runners
          # Run manually on capable hardware: cd gf64/test && make test_all && ./test_all

  test-wave9:
    name: Wave 9 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and verify
        run: |
          npm install
          echo "Build successful - PAR3 gf64 integration complete"