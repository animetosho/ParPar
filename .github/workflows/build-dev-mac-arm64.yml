name: Build dev MacOS arm64 binary
on:
  workflow_dispatch:

jobs:
  build-dev-mac-arm64:
    name: Build dev arm64 MacOS binary
    runs-on: macos-14
    env:
      BUILD_ARCH: arm64
      BUILD_LOGLEVEL: verbose
    steps:
      - uses: actions/checkout@v4
      - run: npm install --production --ignore-scripts
      - run: npm install --production
        working-directory: nexe
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # 'pipes' removed in Python 3.13, 'rU' mode unsupported in 3.11
      - run: node build
        working-directory: nexe
      - run: xz -9e --lzma2 nexe/parpar -c > parpar.xz
      - uses: actions/upload-artifact@v4
        with:
          path: ./parpar.xz
          name: parpar-${{ github.ref_name }}-macos-arm64.xz
          retention-days: 5
